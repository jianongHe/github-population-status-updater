name: Keep scheduled workflows active

on:
  workflow_dispatch:
  schedule:
    # GitHub can disable scheduled workflows in public repos after 60 days with
    # no repository activity. This monthly commit is optional, but keeps the repo
    # visibly active if you keep the repository public and otherwise untouched.
    - cron: "41 3 1 * *"

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update keepalive marker
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt

      - name: Commit keepalive marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git diff --cached --quiet || git commit -m "chore: keep scheduled workflows active"
          git push
